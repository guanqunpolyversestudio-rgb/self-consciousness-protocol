services:
  - type: web
    name: self-consciousness-backend
    runtime: python
    rootDir: backend
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    numInstances: 1
    disk:
      name: app-data
      mountPath: /opt/render/project/src/backend/render-data
      sizeGB: 5
    envVars:
      - key: SC_BACKEND_DB_PATH
        value: /opt/render/project/src/backend/render-data/consciousness.db
      - key: WAVESPEED_API_KEY
        sync: false
